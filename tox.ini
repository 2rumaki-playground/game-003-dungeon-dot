[tox]
env_list = py312, py313, lint, typecheck, deps
min_version = 4.23
requires = tox-uv>=1.16

[testenv]
runner = uv-venv-runner
description = ユニットテスト実行 ({base_python})
commands =
    pytest {posargs}

[testenv:lint]
description = Ruff lint + format チェック
skip_install = true
commands =
    ruff format --check src tests
    ruff check src tests

[testenv:typecheck]
description = ty による型チェック
skip_install = true
commands =
    ty check src

[testenv:deps]
description = import-linter によるモジュール依存チェック
commands =
    lint-imports
